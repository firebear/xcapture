<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCapture - Feature Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .feature-card h1 {
            font-size: 32px;
            margin-bottom: 16px;
            color: #000;
        }

        .feature-card p {
            font-size: 16px;
            color: #333;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .features {
            text-align: left;
            margin-bottom: 32px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            font-size: 15px;
            color: #000;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: #1da1f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 20px;
        }

        .cta {
            display: inline-block;
            background: #1da1f2;
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .cta:hover {
            background: #1a91da;
        }

        .version {
            margin-top: 24px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="feature-card">
        <h1>📸 XCapture</h1>
        <p>The easiest way to capture tweets</p>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📸</div>
                <span><strong>One-click screenshot</strong> - Click camera icon in tweet action bar</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎨</div>
                <span><strong>Preserve styling</strong> - Keep original tweet look</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📋</div>
                <span><strong>Copy or download</strong> - Your choice, share easily</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔒</div>
                <span><strong>Privacy first</strong> - No data collection, works locally</span>
            </div>
        </div>

        <a href="#" class="cta">Install Now</a>
        
        <p class="version">Version 1.0.0 | Free | No Ads</p>
    </div>
</body>
</html>
