<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCapture - Modal Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-content {
            position: relative;
            background: white;
            border-radius: 16px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            color: #000;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #e1e8ed;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #657786;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: #1da1f2;
        }

        .modal-image-container {
            padding: 20px;
            max-height: 60vh;
            overflow: auto;
            background: #f5f8f8;
        }

        .modal-image-container img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #e1e8ed;
        }

        .modal-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .modal-btn-copy {
            background-color: #1da1f2;
            color: white;
        }

        .modal-btn-copy:hover {
            background-color: #1a91da;
        }

        .modal-btn-download {
            background-color: #14171a;
            color: white;
        }

        .modal-btn-download:hover {
            background-color: #0f1316;
        }

        /* Mock tweet image preview */
        .mock-tweet-preview {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .mock-tweet-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .mock-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
        }

        .mock-user-info {
            flex: 1;
        }

        .mock-name {
            font-weight: 700;
            font-size: 15px;
            color: #000;
        }

        .mock-handle {
            color: #657786;
            font-size: 15px;
        }

        .mock-content {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 12px;
            color: #000;
        }

        .mock-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>截图预览</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-image-container">
                <div class="mock-tweet-preview">
                    <div class="mock-tweet-header">
                        <div class="mock-avatar"></div>
                        <div class="mock-user-info">
                            <div class="mock-name">XCapture</div>
                            <div class="mock-handle">@xcapture_app</div>
                        </div>
                    </div>
                    <div class="mock-content">
                        📸 XCapture - The easiest way to capture tweets!
                        <br><br>
                        One-click screenshot from action bar
                        <br>
                        Preserve original styling
                        <br>
                        Copy or download - your choice!
                    </div>
                    <div class="mock-image"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-copy">📋 复制到剪贴板</button>
                <button class="modal-btn modal-btn-download">💾 下载图片</button>
            </div>
        </div>
    </div>
</body>
</html>
